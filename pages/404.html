<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Stackly Consulting</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/styles.css" />

    <style>
      /* ── 404 Page ─────────────────────────────────────────────────────── */
      .error-page {
        min-height: 100vh;
        background: var(--primary-dark);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 10px 20px;
      }

      /* Ambient glow blobs */
      .error-page::before {
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(197, 168, 128, 0.1) 0%,
          transparent 65%
        );
        top: -180px;
        right: -180px;
        pointer-events: none;
      }

      .error-page::after {
        content: "";
        position: absolute;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(21, 45, 71, 0.8) 0%,
          transparent 70%
        );
        bottom: -150px;
        left: -150px;
        pointer-events: none;
      }

      /* Grid overlay */
      .error-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(197, 168, 128, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(197, 168, 128, 0.04) 1px, transparent 1px);
        background-size: 56px 56px;
        pointer-events: none;
      }

      /* Floating particles */
      .error-particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .error-particles span {
        position: absolute;
        bottom: -10px;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0;
        animation: floatUp 4s ease-in infinite;
      }

      .error-particles span:nth-child(1) {
        left: 8%;
        animation-delay: 0s;
        width: 2px;
        height: 2px;
      }
      .error-particles span:nth-child(2) {
        left: 20%;
        animation-delay: 0.6s;
        width: 4px;
        height: 4px;
      }
      .error-particles span:nth-child(3) {
        left: 35%;
        animation-delay: 1.2s;
      }
      .error-particles span:nth-child(4) {
        left: 50%;
        animation-delay: 0.3s;
        width: 2px;
        height: 2px;
      }
      .error-particles span:nth-child(5) {
        left: 65%;
        animation-delay: 1.5s;
        width: 4px;
        height: 4px;
      }
      .error-particles span:nth-child(6) {
        left: 78%;
        animation-delay: 0.9s;
      }
      .error-particles span:nth-child(7) {
        left: 90%;
        animation-delay: 2s;
        width: 2px;
        height: 2px;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        20% {
          opacity: 0.6;
        }
        80% {
          opacity: 0.2;
        }
        100% {
          transform: translateY(-100vh) scale(0.4);
          opacity: 0;
        }
      }

      /* Content wrapper */
      .error-content {
        position: relative;
        z-index: 2;
        text-align: center;
        max-width: 680px;
        width: 100%;
      }

      /* Logo - Moved to Top Left Corner */
      .error-logo {
        position: absolute;
        top: 40px;
        left: 40px;
        z-index: 10;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }

      .error-logo img {
        height: 38px;
        filter: brightness(0) saturate(100%) invert(75%) sepia(30%)
          saturate(400%) hue-rotate(5deg) brightness(105%) contrast(90%);
      }

      .error-logo-text {
        font-family: "Outfit", sans-serif;
        font-size: 1.3rem;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.5px;
      }

      .error-logo-text strong {
        color: var(--accent);
      }

      /* 404 number */
      .error-code-wrap {
        position: relative;
        display: inline-block;
        margin-bottom: 32px;
      }

      .error-code {
        font-family: "Outfit", sans-serif;
        font-size: clamp(7rem, 18vw, 11rem);
        font-weight: 800;
        line-height: 1;
        background: linear-gradient(
          135deg,
          #dfc298 0%,
          #c5a880 50%,
          #a8845e 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -4px;
        filter: drop-shadow(0 0 40px rgba(197, 168, 128, 0.25));
      }

      /* Divider line under 404 */
      .error-divider {
        width: 80px;
        height: 2px;
        background: var(--gold-gradient);
        margin: 0 auto 28px;
        border-radius: 2px;
      }

      /* Badge */
      .error-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 18px;
        background: rgba(197, 168, 128, 0.1);
        border: 1px solid rgba(197, 168, 128, 0.25);
        border-radius: 30px;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 24px;
      }

      .error-badge i {
        font-size: 0.7rem;
      }

      /* Heading & description */
      .error-heading {
        font-family: "Outfit", sans-serif;
        font-size: clamp(1.6rem, 4vw, 2.2rem);
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 16px;
        line-height: 1.3;
      }

      .error-desc {
        color: rgba(255, 255, 255, 0.5);
        font-size: 1rem;
        line-height: 1.75;
        margin-bottom: 44px;
        max-width: 480px;
        margin-left: auto;
        margin-right: auto;
      }

      /* Action buttons */
      .error-actions {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 56px;
      }

      .btn-error-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: var(--gold-gradient);
        color: #ffffff;
        font-weight: 600;
        font-size: 0.92rem;
        border-radius: 8px;
        border: none;
        text-decoration: none;
        box-shadow: 0 4px 20px rgba(197, 168, 128, 0.3);
        transition: var(--transition-fast);
      }

      .btn-error-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(197, 168, 128, 0.45);
        color: #ffffff;
      }

      .btn-error-outline {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 13px 28px;
        background: transparent;
        color: rgba(255, 255, 255, 0.75);
        font-weight: 600;
        font-size: 0.92rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        text-decoration: none;
        transition: var(--transition-fast);
      }

      .btn-error-outline:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: rgba(197, 168, 128, 0.06);
      }

      /* Quick links */
      .error-links-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: rgba(255, 255, 255, 0.3);
        font-weight: 600;
        margin-bottom: 16px;
      }

      .error-quick-links {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .error-quick-links a {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 30px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 0.82rem;
        font-weight: 500;
        text-decoration: none;
        transition: var(--transition-fast);
      }

      .error-quick-links a i {
        font-size: 0.72rem;
        color: var(--accent);
      }

      .error-quick-links a:hover {
        border-color: rgba(197, 168, 128, 0.35);
        color: var(--accent);
        background: rgba(197, 168, 128, 0.06);
      }

      /* Decorative ring */
      .error-ring {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(197, 168, 128, 0.08);
        pointer-events: none;
        z-index: 1;
      }

      .error-ring-1 {
        width: 340px;
        height: 340px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .error-ring-2 {
        width: 520px;
        height: 520px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      .error-ring-3 {
        width: 700px;
        height: 700px;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      @media (max-width: 576px) {
        /* Mobile adjustment for top left logo spacing */
        .error-logo {
          top: 24px;
          left: 20px;
        }
        .error-actions {
          flex-direction: column;
          align-items: stretch;
        }
        .btn-error-primary,
        .btn-error-outline {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-grid"></div>
      <div class="error-particles">
        <span></span><span></span><span></span><span></span> <span></span
        ><span></span><span></span>
      </div>
      <div class="error-ring error-ring-1"></div>
      <div class="error-ring error-ring-2"></div>
      <div class="error-ring error-ring-3"></div>

      <a href="../index.html" class="error-logo reveal reveal-down">
        <img src="../assets/images/logoStackly.webp" alt="Stackly Consulting" />
      </a>

      <div class="error-content reveal reveal-up delay-100">
        <div class="error-code-wrap">
          <div class="error-code">404</div>
        </div>

        <div class="error-divider"></div>

        <div class="error-badge">
          <i class="fa-solid fa-triangle-exclamation"></i>
          Page Not Found
        </div>

        <h1 class="error-heading">This Page Has Left the Portfolio</h1>

        <p class="error-desc">
          The page you're looking for may have been moved, restructured, or no
          longer exists. Let us guide you back to the right destination.
        </p>

        <div class="error-actions">
          <a href="../index.html" class="btn-error-primary">
            <i class="fa-solid fa-house"></i> Back to Home
          </a>
          <a href="javascript:history.back()" class="btn-error-outline">
            <i class="fa-solid fa-headset"></i> Go Back
          </a>
        </div>

        <p class="error-links-label">Or explore these pages</p>
        <div class="error-quick-links">
          <a href="about.html"
            ><i class="fa-solid fa-building-columns"></i> About</a
          >
          <a href="services.html"
            ><i class="fa-solid fa-briefcase"></i> Services</a
          >
          <a href="portfolio.html"
            ><i class="fa-solid fa-chart-pie"></i> Portfolio</a
          >
          <a href="history.html"
            ><i class="fa-solid fa-clock-rotate-left"></i> History</a
          >
          <a href="contact.html"
            ><i class="fa-solid fa-envelope"></i> Contact</a
          >
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
